<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzer Online - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --white: #ffffff; --danger: #ff4757; --success: #2ed573; --accent: #a29bfe; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        
        #loginScreen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        .login-card { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 320px; text-align: center; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .create-btn { background: var(--success); color: white; }
        .join-btn { background: var(--primary); color: white; }

        #gameScreen { display: none; height: 100vh; flex-direction: column; }

        /* تنسيق القائمة العلوية للجوال والكمبيوتر */
        .sidebar { width: 100%; background: var(--white); border-bottom: 2px solid var(--primary); display: flex; flex-direction: column; max-height: 200px; }
        .sidebar-header { padding: 10px; background: var(--primary); color: white; font-weight: bold; text-align: center; font-size: 0.9rem; }
        
        /* قائمة الأسماء المتحركة أفقياً */
        .player-list { 
            display: flex; 
            flex-direction: row; 
            overflow-x: auto; 
            padding: 10px; 
            gap: 10px; 
            white-space: nowrap;
            background: #f8f9fa;
            -webkit-overflow-scrolling: touch;
        }
        .player-card { 
            background: var(--white); 
            padding: 8px 15px; 
            border-radius: 20px; 
            border: 1px solid #ddd;
            display: flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .score-tag { background: var(--success); color: white; padding: 2px 7px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        /* منطقة اللعب */
        .main-play { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; position: relative; }
        .room-badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }

        .buzzer-btn { width: 180px; height: 180px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 1.5rem; font-weight: bold; box-shadow: 0 10px #b33939; cursor: pointer; margin: 20px 0; transition: 0.1s; }
        .buzzer-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 4px #b33939; }
        .buzzer-btn:disabled { background: #dcdde1; box-shadow: 0 6px #7f8c8d; }

        /* نتائج الجولة والدردشة */
        .rank-box { width: 100%; max-width: 450px; background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        
        .chat-area { width: 100%; max-width: 450px; margin-top: 15px; background: white; border-radius: 15px; display: flex; flex-direction: column; height: 150px; border: 1px solid #eee; }
        #chatMessages { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; }
        #chatInput { border: none; border-top: 1px solid #eee; padding: 10px; border-radius: 0 0 15px 15px; }

        .btn-point { background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; padding: 4px 10px; font-size: 0.8rem; }
        .btn-reset { padding: 12px 40px; background: var(--success); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 15px 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2 style="color: var(--primary);">Buzzer Online</h2>
            <input type="text" id="userName" placeholder="اسمك المستعار">
            <select id="userRole">
                <option value="player">أنا لاعب</option>
                <option value="admin">أنا أدمن</option>
            </select>
            <input type="text" id="roomCodeInput" placeholder="أدخل رمز الغرفة">
            <button class="btn-action join-btn" onclick="startApp('join')">دخول / انضمام</button>
            <button class="btn-action create-btn" onclick="startApp('create')">إنشاء غرفة جديدة</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="sidebar">
            <div class="sidebar-header">المتواجدون (اسحب لليمين/اليسار ↔️)</div>
            <div id="playerList" class="player-list"></div>
        </div>
        
        <div class="main-play">
            <div id="roomDisplay" class="room-badge">غرفة: #----</div>
            <h3 id="statusMsg">استعد للضغط!</h3>
            <button id="mainBuzzer" class="buzzer-btn">اضغط!</button>
            
            <div class="rank-box">
                <strong>ترتيب الضغطات:</strong>
                <div id="rankContainer">بانتظار المتسابقين...</div>
            </div>

            <div class="chat-area">
                <div id="chatMessages"></div>
                <input type="text" id="chatInput" placeholder="اكتب رسالة...">
            </div>

            <div id="adminArea" class="hidden">
                <button class="btn-reset" onclick="triggerReset()">إعادة تعيين (Reset) 🔄</button>
            </div>
        </div>
    </div>

    <audio id="audioBuzzer" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCp3On2Z1xFeZrIQlOsQvsIoGHaGnFvmBw",
        authDomain: "buzzergame-f59e4.firebaseapp.com",
        projectId: "buzzergame-f59e4",
        databaseURL: "https://buzzergame-f59e4-default-rtdb.firebaseio.com/",
        storageBucket: "buzzergame-f59e4.firebasestorage.app",
        messagingSenderId: "833301631932",
        appId: "1:833301631932:web:4dbe69851ec3d5125051b9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myName, myRole, myRoom, myPlayerKey;

    function startApp(mode) {
        myName = document.getElementById('userName').value.trim();
        if(!myName) return alert("اكتب اسمك أولاً");

        if(mode === 'create') {
            myRoom = Math.floor(1000 + Math.random() * 9000).toString();
        } else {
            myRoom = document.getElementById('roomCodeInput').value.trim();
            if(!myRoom) return alert("أدخل رمز الغرفة");
        }

        myRole = document.getElementById('userRole').value;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        document.getElementById('roomDisplay').innerText = "غرفة: #" + myRoom;

        if(myRole === 'admin') document.getElementById('adminArea').classList.remove('hidden');

        // تسجيل اللاعب مع الاحتفاظ بالـ Key لمنع الاختفاء
        const playerRef = db.ref(`rooms/${myRoom}/players`).push();
        myPlayerKey = playerRef.key;
        playerRef.set({ name: myName, role: myRole });
        playerRef.onDisconnect().remove();

        listenToRoom();
    }

    function listenToRoom() {
        // تحديث القائمة العلوية مع النقاط
        db.ref(`rooms/${myRoom}`).on('value', snap => {
            const data = snap.val() || {};
            const players = data.players || {};
            const scores = data.scores || {};
            
            const list = document.getElementById('playerList');
            list.innerHTML = "";
            Object.values(players).forEach(p => {
                const pScore = scores[p.name] || 0;
                list.innerHTML += `
                    <div class="player-card">
                        <span>${p.role=='admin'?'👑':'🎮'} ${p.name}</span>
                        <span class="score-tag">${pScore}</span>
                    </div>`;
            });

            // تحديث جدول الترتيب
            const clicks = data.clicks || {};
            const container = document.getElementById('rankContainer');
            let clickArray = Object.values(clicks).sort((a, b) => a.time - b.time);
            
            if(clickArray.length === 0) {
                container.innerHTML = "بانتظار المتسابقين...";
                document.getElementById('mainBuzzer').disabled = false;
                document.getElementById('statusMsg').innerText = "استعد للضغط!";
            } else {
                let html = "";
                clickArray.forEach((c, index) => {
                    html += `
                        <div class="rank-item">
                            <span>${index+1}. ${c.name}</span>
                            <span>
                                ${index === 0 ? "الأول!" : "+"+((c.time - clickArray[0].time)/1000).toFixed(2)+"s"}
                                ${myRole=='admin' ? `<button class="btn-point" onclick="addPoint('${c.name}')">نقطة +</button>` : ''}
                            </span>
                        </div>`;
                });
                container.innerHTML = html;
            }
        });

        // الدردشة
        db.ref(`rooms/${myRoom}/chat`).limitToLast(15).on('child_added', snap => {
            const m = snap.val();
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = "3px";
            msgDiv.innerHTML = `<b>${m.user}:</b> ${m.text}`;
            const box = document.getElementById('chatMessages');
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('mainBuzzer').onclick = function() {
        this.disabled = true;
        document.getElementById('audioBuzzer').play();
        db.ref(`rooms/${myRoom}/clicks`).push({ name: myName, time: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('statusMsg').innerText = "تم تسجيل ضغطتك!";
    };

    function addPoint(playerName) {
        db.ref(`rooms/${myRoom}/scores/${playerName}`).transaction(c => (c || 0) + 1);
    }

    function triggerReset() {
        db.ref(`rooms/${myRoom}/clicks`).remove();
    }

    document.getElementById('chatInput').onkeypress = function(e) {
        if (e.key === 'Enter' && this.value.trim()) {
            db.ref(`rooms/${myRoom}/chat`).push({ user: myName, text: this.value.trim() });
            this.value = "";
        }
    };
</script>
</body>
</html>
