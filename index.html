<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerva System </title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #6c5ce7; --bg: #0f172a; --white: #ffffff; --danger: #ff4757; --success: #2ed573; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        #loginScreen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 350px; text-align: center; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .create-btn { background: var(--success); color: white; }
        .join-btn { background: var(--primary); color: white; }

        #gameScreen { display: none; height: 100vh; flex-direction: column; }

        .header-nav { width: 100%; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; flex-direction: column; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--primary); }
        
        .player-list { display: flex; flex-direction: row; overflow-x: auto; padding: 10px; gap: 12px; background: #1e293b; scrollbar-width: none; }
        .player-card { background: #0f172a; padding: 8px 15px; border-radius: 15px; border: 1px solid #334155; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        
        .score-box { display: flex; align-items: center; gap: 5px; background: var(--success); padding: 2px 8px; border-radius: 8px; font-weight: bold; }
        .admin-controls { display: flex; gap: 5px; }
        .btn-small { padding: 2px 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        .main-play { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; overflow-y: auto; }
        .buzzer-btn { width: 180px; height: 180px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 1.6rem; font-weight: bold; box-shadow: 0 10px #b33939; cursor: pointer; margin: 20px 0; }
        .buzzer-btn:active { transform: translateY(4px); box-shadow: 0 6px #b33939; }
        .buzzer-btn:disabled { background: #475569; box-shadow: none; transform: translateY(8px); }

        .rank-box { width: 100%; max-width: 450px; background: var(--card); border-radius: 15px; padding: 15px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }

        .chat-area { width: 100%; max-width: 450px; margin-top: 15px; background: var(--card); border-radius: 15px; height: 120px; display: flex; flex-direction: column; }
        #chatMessages { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; }
        #chatInput { border: none; border-top: 1px solid #334155; background: transparent; padding: 10px; color: white; }

        .logout-btn { background: #ff4757; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">MINERVA SYSTEM 2.0</h2>
            <input type="text" id="userName" placeholder="اسمك المستعار">
            <select id="userRole">
                <option value="player">أنا لاعب</option>
                <option value="admin">أنا أدمن</option>
            </select>
            <input type="text" id="roomCodeInput" placeholder="رمز الغرفة">
            <button class="btn-action join-btn" onclick="startApp('join')">دخول</button>
            <button class="btn-action create-btn" onclick="startApp('create')">إنشاء غرفة</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="header-nav">
            <div class="nav-top">
                <span id="roomDisplay">غرفة: #----</span>
                <button class="logout-btn" onclick="logout()">خروج 🚪</button>
            </div>
            <div id="playerList" class="player-list"></div>
        </div>
        
        <div class="main-play">
            <div id="playerUI" style="text-align: center; width: 100%;">
                <h3 id="statusMsg">استعد!</h3>
                <button id="mainBuzzer" class="buzzer-btn">اضغط!</button>
            </div>

            <div class="rank-box">
                <strong>ترتيب الضغطات:</strong>
                <div id="rankContainer">بانتظار المتسابقين...</div>
                <div id="adminResetArea" class="hidden" style="margin-top:15px; text-align:center;">
                    <button class="btn-action join-btn" onclick="triggerReset()">ريسيت للجولة 🔄</button>
                </div>
            </div>

            <div class="chat-area">
                <div id="chatMessages"></div>
                <input type="text" id="chatInput" placeholder="اكتب رسالة...">
            </div>
        </div>
    </div>

    <audio id="audioBuzzer" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCp3On2Z1xFeZrIQlOsQvsIoGHaGnFvmBw",
        authDomain: "buzzergame-f59e4.firebaseapp.com",
        projectId: "buzzergame-f59e4",
        databaseURL: "https://buzzergame-f59e4-default-rtdb.firebaseio.com/",
        storageBucket: "buzzergame-f59e4.firebasestorage.app",
        messagingSenderId: "833301631932",
        appId: "1:833301631932:web:4dbe69851ec3d5125051b9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myName, myRole, myRoom;

    // محاولة استعادة الجلسة عند التحديث
    window.onload = () => {
        const savedData = localStorage.getItem('minerva_session');
        if(savedData) {
            const session = JSON.parse(savedData);
            document.getElementById('userName').value = session.name;
            document.getElementById('userRole').value = session.role;
            document.getElementById('roomCodeInput').value = session.room;
            startApp('join', true);
        }
    };

    function startApp(mode, isAuto = false) {
        myName = document.getElementById('userName').value.trim();
        myRole = document.getElementById('userRole').value;
        if(mode === 'create') {
            myRoom = Math.floor(1000 + Math.random() * 9000).toString();
        } else {
            myRoom = document.getElementById('roomCodeInput').value.trim();
        }

        if(!myName || !myRoom) return !isAuto && alert("تأكد من البيانات");

        // حفظ الجلسة
        localStorage.setItem('minerva_session', JSON.stringify({name: myName, role: myRole, room: myRoom}));

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        document.getElementById('roomDisplay').innerText = "غرفة: #" + myRoom;

        if(myRole === 'admin') {
            document.getElementById('playerUI').style.display = 'none';
            document.getElementById('adminResetArea').classList.remove('hidden');
        }

        const playerRef = db.ref(`rooms/${myRoom}/players/${myName}`);
        playerRef.set({ name: myName, role: myRole });
        playerRef.onDisconnect().remove();

        listenToRoom();
    }

    function listenToRoom() {
        db.ref(`rooms/${myRoom}`).on('value', snap => {
            const data = snap.val() || {};
            const players = data.players || {};
            const scores = data.scores || {};
            const clicks = data.clicks || {};
            
            // قائمة اللاعبين مع نظام نقاط مستقل للأدمن
            const list = document.getElementById('playerList');
            list.innerHTML = "";
            Object.values(players).forEach(p => {
                const pScore = scores[p.name] || 0;
                let controls = (myRole === 'admin') ? `
                    <div class="admin-controls">
                        <button class="btn-small create-btn" onclick="modScore('${p.name}', 1)">+</button>
                        <button class="btn-small logout-btn" onclick="modScore('${p.name}', -1)">-</button>
                    </div>` : "";
                
                list.innerHTML += `
                    <div class="player-card">
                        <span>${p.role=='admin'?'👑':'🎮'} ${p.name} ${p.name==myName?'(أنت)':''}</span>
                        <div class="score-box">🏆 ${pScore}</div>
                        ${controls}
                    </div>`;
            });

            // ترتيب الضغطات
            const container = document.getElementById('rankContainer');
            let clickArray = Object.values(clicks).sort((a, b) => a.time - b.time);
            
            if(clickArray.length === 0) {
                container.innerHTML = "بانتظار الضغط...";
                document.getElementById('mainBuzzer').disabled = false;
                document.getElementById('statusMsg').innerText = "استعد!";
            } else {
                let html = "";
                clickArray.forEach((c, i) => {
                    html += `<div class="rank-item"><span>${i+1}. ${c.name}</span><span>${i==0?"الأول!":"+"+((c.time-clickArray[0].time)/1000).toFixed(2)+"s"}</span></div>`;
                });
                container.innerHTML = html;
            }
        });
    }

    document.getElementById('mainBuzzer').onclick = function() {
        this.disabled = true;
        document.getElementById('audioBuzzer').play();
        db.ref(`rooms/${myRoom}/clicks`).push({ name: myName, time: firebase.database.ServerValue.TIMESTAMP });
        document.getElementById('statusMsg').innerText = "تم التسجيل!";
    };

    function modScore(target, val) {
        db.ref(`rooms/${myRoom}/scores/${target}`).transaction(c => (c || 0) + val);
    }

    function triggerReset() { db.ref(`rooms/${myRoom}/clicks`).remove(); }

    function logout() {
        localStorage.removeItem('minerva_session');
        location.reload();
    }

    document.getElementById('chatInput').onkeypress = function(e) {
        if (e.key === 'Enter' && this.value.trim()) {
            db.ref(`rooms/${myRoom}/chat`).push({ user: myName, text: this.value.trim() });
            this.value = "";
        }
    };
    // عرض رسائل الشات
    db.ref(`rooms/${myRoom}/chat`).limitToLast(10).on('child_added', snap => {
        const m = snap.val();
        const msg = document.createElement('div');
        msg.innerHTML = `<b>${m.user}:</b> ${m.text}`;
        document.getElementById('chatMessages').appendChild(msg);
        document.getElementById('chatMessages').scrollTop = 9999;
    });
</script>
</body>
</html>
