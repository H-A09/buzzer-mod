<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzer Online - Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --white: #ffffff; --danger: #ff4757; --success: #2ed573; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        #loginScreen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        .login-card { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .create-btn { background: var(--success); color: white; }
        .join-btn { background: var(--primary); color: white; }
        #gameScreen { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 250px; background: var(--white); border-left: 4px solid var(--primary); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--primary); color: white; font-weight: bold; text-align: center; }
        .player-list { flex-grow: 1; padding: 15px; overflow-y: auto; }
        .player-card { background: #f1f2f6; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; border-right: 4px solid #ccc; }
        .main-play { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        .room-badge { position: absolute; top: 20px; right: 20px; background: #dfe6e9; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: var(--primary); }
        .buzzer-btn { width: 220px; height: 220px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 2rem; font-weight: bold; box-shadow: 0 12px #b33939; cursor: pointer; transition: 0.1s; margin-top: 40px; }
        .buzzer-btn:active { transform: translateY(8px); box-shadow: 0 4px #b33939; }
        .buzzer-btn:disabled { background: #ccc; box-shadow: 0 8px #999; cursor: not-allowed; }
        .rank-box { width: 100%; max-width: 450px; background: white; border-radius: 15px; padding: 20px; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-reset { padding: 15px 50px; background: var(--success); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px #21a455; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2 style="color: var(--primary);">Buzzer Online</h2>
            <input type="text" id="userName" placeholder="اسمك المستعار">
            <select id="userRole">
                <option value="player">أنا لاعب</option>
                <option value="admin">أنا أدمن</option>
            </select>
            <input type="text" id="roomCodeInput" placeholder="أدخل رمز الغرفة">
            <button class="btn-action join-btn" onclick="startApp('join')">دخول / انضمام</button>
            <div style="margin: 10px 0; color: #888;">أو</div>
            <button class="btn-action create-btn" onclick="startApp('create')">إنشاء غرفة جديدة عشوائية</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="sidebar">
            <div class="sidebar-header">المتواجدون</div>
            <div id="playerList" class="player-list"></div>
        </div>
        <div class="main-play">
            <div id="roomDisplay" class="room-badge">غرفة: #----</div>
            <h3 id="statusMsg" style="margin-top: 60px;">استعد للضغط!</h3>
            <button id="mainBuzzer" class="buzzer-btn">اضغط!</button>
            <div class="rank-box">
                <strong>نتائج الجولة:</strong>
                <div id="rankContainer" style="margin-top:10px;">بانتظار المتسابقين...</div>
            </div>
            <div id="adminArea" class="hidden">
                <button class="btn-reset" onclick="triggerReset()">إعادة تعيين (Reset) 🔄</button>
            </div>
        </div>
    </div>

<script>
    // إعدادات Firebase الخاصة بك المدمجة
    const firebaseConfig = {
        apiKey: "AIzaSyCp3On2Z1xFeZrIQlOsQvsIoGHaGnFvmBw",
        authDomain: "buzzergame-f59e4.firebaseapp.com",
        projectId: "buzzergame-f59e4",
        databaseURL: "https://buzzergame-f59e4-default-rtdb.firebaseio.com/",
        storageBucket: "buzzergame-f59e4.firebasestorage.app",
        messagingSenderId: "833301631932",
        appId: "1:833301631932:web:4dbe69851ec3d5125051b9",
        measurementId: "G-MB3DWXL8NN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myName, myRole, myRoom;

    function startApp(mode) {
        myName = document.getElementById('userName').value;
        if(!myName) return alert("اكتب اسمك أولاً");

        if(mode === 'create') {
            myRoom = Math.floor(1000 + Math.random() * 9000).toString();
        } else {
            myRoom = document.getElementById('roomCodeInput').value;
            if(!myRoom) return alert("أدخل رمز الغرفة");
        }

        myRole = document.getElementById('userRole').value;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        document.getElementById('roomDisplay').innerText = "غرفة: #" + myRoom;

        if(myRole === 'admin') {
            document.getElementById('adminArea').classList.remove('hidden');
            document.getElementById('mainBuzzer').classList.add('hidden');
        }

        const playerRef = db.ref(`rooms/${myRoom}/players`).push();
        playerRef.set({ name: myName, role: myRole });
        playerRef.onDisconnect().remove();

        listenToRoom();
    }

    function listenToRoom() {
        db.ref(`rooms/${myRoom}/players`).on('value', snap => {
            const list = document.getElementById('playerList');
            list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `<div class="player-card"><span>${p.name}</span><span>${p.role=='admin'?'👑':'🎮'}</span></div>`;
            });
        });

        db.ref(`rooms/${myRoom}/clicks`).on('value', snap => {
            const container = document.getElementById('rankContainer');
            if(!snap.exists()) {
                container.innerHTML = "بانتظار المتسابقين...";
                document.getElementById('mainBuzzer').disabled = false;
                document.getElementById('statusMsg').innerText = "استعد للضغط!";
                return;
            }
            
            let html = "";
            let clicks = [];
            snap.forEach(child => { clicks.push(child.val()); });
            clicks.sort((a, b) => a.time - b.time); 
            
            clicks.forEach((c, index) => {
                html += `<div class="rank-item"><span>${index+1}. ${c.name}</span><span>${((c.time - clicks[0].time)/1000).toFixed(2)}s+</span></div>`;
            });
            container.innerHTML = html;
        });
    }

    document.getElementById('mainBuzzer').onclick = function() {
        this.disabled = true;
        db.ref(`rooms/${myRoom}/clicks`).push({
            name: myName,
            time: firebase.database.ServerValue.TIMESTAMP
        });
        document.getElementById('statusMsg').innerText = "تم تسجيل ضغطتك!";
    };

    function triggerReset() {
        db.ref(`rooms/${myRoom}/clicks`).remove();
    }
</script>
</body>
</html>
