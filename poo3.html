<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerva System 2.0 - Buzzer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تحسين الواجهة لتكون متجاوبة */
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            background: var/--glass;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }

        h1 { color: var(--primary); text-shadow: 0 0 10px rgba(99,102,241,0.5); }

        /* زر البزر الكبير */
        .buzzer-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle, #ef4444, #991b1b);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 0 #7f1d1d, 0 20px 30px rgba(0,0,0,0.5);
            transition: all 0.1s active;
            margin: 30px 0;
            position: relative;
        }

        .buzzer-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #7f1d1d, 0 10px 20px rgba(0,0,0,0.5);
        }

        .buzzer-btn:disabled {
            filter: grayscale(0.8);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* نظام الترتيب مع أنيميشن */
        .leaderboard {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        .player-row {
            background: var(--glass);
            animation: slideIn 0.4s ease-out;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .player-row td { padding: 12px; }

        /* الدردشة الجانبية */
        #chat-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 250px;
            height: 300px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; text-align: right; }
        #chat-input { background: transparent; border: none; padding: 10px; color: white; border-top: 1px solid rgba(255,255,255,0.1); }

        .admin-controls {
            margin-top: 20px;
            padding: 10px;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }

        .btn-small {
            background: var(--primary);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MINERVA SYSTEM 2.0</h1>
        <div id="status-text">أدخل اسمك للبدء</div>
        
        <input type="text" id="username" placeholder="اسمك الكريم..." style="padding:10px; border-radius:10px; border:none; margin-top:10px;">
        <br>
        <button id="mainBuzzer" class="buzzer-btn">اضغط!</button>

        <table class="leaderboard">
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>الاسم</th>
                    <th>الزمن</th>
                    <th>النقاط</th>
                    <th class="admin-only" style="display:none">تحكم</th>
                </tr>
            </thead>
            <tbody id="results-list"></tbody>
        </table>

        <div class="admin-controls" id="adminArea" style="display:none">
            <button onclick="resetGame()" class="btn-small" style="background:var(--accent)">إعادة ضبط الجولة</button>
        </div>
    </div>

    <div id="chat-box">
        <div id="messages"></div>
        <input type="text" id="chat-input" placeholder="اكتب رسالة...">
    </div>

    <audio id="sound-buzzer" src="https://assets.mixkit.co/active_storage/sfx/2958/2958-preview.mp3"></audio>
    <audio id="sound-reset" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // رابط قاعدة بياناتك المستخرج
        const firebaseConfig = {
            databaseURL: "https://buzzergame-f59e4-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'table-cell');
        }

        const buzzerBtn = document.getElementById('mainBuzzer');
        const usernameInput = document.getElementById('username');

        // التعامل مع الضغط المتكرر
        buzzerBtn.onclick = function() {
            const name = usernameInput.value.trim();
            if (!name) { alert("اكتب اسمك أولاً!"); return; }

            // قفل الزر فوراً لمنع التكرار
            buzzerBtn.disabled = true;
            document.getElementById('sound-buzzer').play();

            const timestamp = Date.now();
            db.ref('presses').push({
                name: name,
                time: timestamp
            });
        };

        // تحديث القائمة فورياً
        db.ref('presses').on('value', (snapshot) => {
            const list = document.getElementById('results-list');
            list.innerHTML = "";
            let data = [];
            snapshot.forEach(child => {
                data.push({...child.val(), id: child.key});
            });

            data.sort((a, b) => a.time - b.time);

            data.forEach((player, index) => {
                const startTime = data[0].time;
                const diff = ((player.time - startTime) / 1000).toFixed(3);
                
                const row = `
                    <tr class="player-row">
                        <td>${index + 1}</td>
                        <td>${player.name}</td>
                        <td>${index === 0 ? "الأول!" : "+" + diff + "s"}</td>
                        <td id="score-${player.name}">0</td>
                        ${isAdmin ? `<td><button class="btn-small" onclick="addPoint('${player.name}')">+1</button></td>` : ""}
                    </tr>
                `;
                list.innerHTML += row;
            });
        });

        // نظام النقاط
        function addPoint(name) {
            const scoreRef = db.ref('scores/' + name);
            scoreRef.transaction(current => (current || 0) + 1);
        }

        db.ref('scores').on('value', (snapshot) => {
            snapshot.forEach(child => {
                const el = document.getElementById('score-' + child.key);
                if (el) el.innerText = child.val();
            });
        });

        // الريسيت
        function resetGame() {
            db.ref('presses').remove();
            document.getElementById('sound-reset').play();
            buzzerBtn.disabled = false;
        }

        db.ref('presses').on('child_removed', () => {
            buzzerBtn.disabled = false;
            document.getElementById('results-list').innerHTML = "";
        });

        // الدردشة
        const chatInput = document.getElementById('chat-input');
        chatInput.onkeypress = (e) => {
            if (e.key === 'Enter' && chatInput.value) {
                db.ref('chat').push({
                    user: usernameInput.value || "مجهول",
                    msg: chatInput.value
                });
                chatInput.value = "";
            }
        };

        db.ref('chat').limitToLast(10).on('child_added', (snap) => {
            const msg = snap.val();
            const div = document.createElement('div');
            div.innerHTML = `<b>${msg.user}:</b> ${msg.msg}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 1000;
        });
    </script>
</body>
</html>
