<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minerva System 2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        
        /* تصميم الواجهة الأولى */
        .box { background: #16213e; padding: 30px; border-radius: 15px; display: inline-block; margin-top: 50px; border: 2px solid #0f3460; }
        input, select { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 80%; }
        button { padding: 12px 25px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* واجهة اللعب */
        .buzzer-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(#ff4d4d, #990000); border: 8px solid #4d0000; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 10px #660000; margin: 20px auto; display: block; }
        .buzzer-btn:active { box-shadow: 0 2px #660000; transform: translateY(8px); }
        
        table { width: 100%; max-width: 500px; margin: 20px auto; border-collapse: collapse; background: #0f3460; }
        th, td { padding: 12px; border: 1px solid #16213e; }
        
        /* الدردشة الجانبية */
        #chat { position: fixed; bottom: 10px; left: 10px; width: 200px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; text-align: right; font-size: 12px; }
        #messages { height: 100px; overflow-y: auto; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="box">
            <h2>MINERVA SYSTEM 2.0</h2>
            <input type="text" id="username" placeholder="أدخل اسمك هنا...">
            <select id="user-role">
                <option value="player">لاعب (Player)</option>
                <option value="admin">أدمن (Admin)</option>
            </select>
            <input type="text" id="room-id" placeholder="اسم الغرفة (مثال: game1)">
            <br>
            <button onclick="joinGame()">دخول اللعبة</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h3 id="display-room">الغرفة: --</h3>
        <p id="display-name">المستخدم: --</p>
        
        <button id="buzzer" class="buzzer-btn" onclick="pressBuzzer()">اضغط!</button>

        <h3>ترتيب المتسابقين</h3>
        <table>
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>الاسم</th>
                    <th>الزمن</th>
                    <th>النقاط</th>
                    <th id="admin-col" style="display:none">تحكم</th>
                </tr>
            </thead>
            <tbody id="results"></tbody>
        </table>

        <div id="admin-controls" style="display:none; margin-top:20px;">
            <button onclick="resetRoom()" style="background:#533483">إعادة ضبط الغرفة (Reset)</button>
        </div>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <input type="text" id="msg-input" placeholder="دردشة..." style="width:90%">
    </div>

    <audio id="sound-buzzer" src="https://assets.mixkit.co/active_storage/sfx/2958/2958-preview.mp3"></audio>

    <script>
        // رابط قاعدة بياناتك
        const firebaseConfig = { databaseURL: "https://buzzergame-f59e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = "";
        let myName = "";
        let role = "";

        function joinGame() {
            myName = document.getElementById('username').value;
            currentRoom = document.getElementById('room-id').value || "public";
            role = document.getElementById('user-role').value;

            if (!myName) { alert("من فضلك أدخل اسمك"); return; }

            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('display-room').innerText = "الغرفة: " + currentRoom;
            document.getElementById('display-name').innerText = "اللاعب: " + myName;

            if (role === 'admin') {
                document.getElementById('admin-controls').style.display = 'block';
                document.getElementById('admin-col').style.display = 'table-cell';
            }

            listenToRoom();
        }

        function pressBuzzer() {
            const time = Date.now();
            document.getElementById('sound-buzzer').play();
            // تسجيل الضغطة للجميع، الترتيب سيتم برمجياً بالأسفل
            db.ref('rooms/' + currentRoom + '/presses').push({
                name: myName,
                time: time
            });
            // قفل الزر محلياً فقط لمنع السبام الزائد
            document.getElementById('buzzer').disabled = true;
            setTimeout(() => { document.getElementById('buzzer').disabled = false; }, 1000);
        }

        function listenToRoom() {
            db.ref('rooms/' + currentRoom + '/presses').on('value', (snap) => {
                const list = document.getElementById('results');
                list.innerHTML = "";
                let data = [];
                snap.forEach(child => { data.push(child.val()); });

                // الترتيب بالأسرع (الزمن الأقل)
                data.sort((a, b) => a.time - b.time);

                data.forEach((p, index) => {
                    let diff = index === 0 ? "الأول!" : "+" + ((p.time - data[0].time)/1000).toFixed(3) + "s";
                    list.innerHTML += `<tr>
                        <td>${index + 1}</td>
                        <td>${p.name}</td>
                        <td>${diff}</td>
                        <td id="score-${p.name}">0</td>
                        ${role==='admin' ? `<td><button onclick="addPoint('${p.name}')">+1</button></td>` : ""}
                    </tr>`;
                });
            });
        }

        function addPoint(name) {
            db.ref('rooms/' + currentRoom + '/scores/' + name).transaction(s => (s || 0) + 1);
        }

        function resetRoom() {
            db.ref('rooms/' + currentRoom + '/presses').remove();
        }

        // الدردشة البسيطة
        document.getElementById('msg-input').onkeypress = (e) => {
            if (e.key === 'Enter') {
                db.ref('rooms/' + currentRoom + '/chat').push(myName + ": " + e.target.value);
                e.target.value = "";
            }
        };
        db.ref('rooms/' + currentRoom + '/chat').limitToLast(5).on('child_added', (s) => {
            const div = document.createElement('div');
            div.innerText = s.val();
            document.getElementById('messages').appendChild(div);
        });
    </script>
</body>
</html>
